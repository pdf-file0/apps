<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Resume - Workday</title></head>
<body>
<div data-automation-id="resumeUploadPage">
  <h2>Resume</h2>
  <p>Upload your resume, or use Autofill with Resume to pre-populate your application.</p>

  <div class="field">
    <label for="resumeFile">Upload Resume *</label>
    <input type="file" id="resumeFile" name="resumeFile" data-automation-id="resumeSection_fileUpload" required aria-describedby="resume-help" />
    <div id="resume-help">PDF or DOCX, up to 5MB.</div>
  </div>

  <button type="button" data-automation-id="select-files-button">Select Files</button>
  <button type="button" data-automation-id="bottom-navigation-next-button">Save and Continue</button>
</div>
</body>
</html>
