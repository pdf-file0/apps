<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Review Your Application - Workday</title></head>
<body>
<div data-automation-id="reviewPage">
  <h2>Review</h2>
  <p>Review your application before you submit this application. Once submitted, changes are no longer possible.</p>

  <div class="summary">
    <p>My Information: completed</p>
    <p>Education: completed</p>
    <p>Application Questions: completed</p>
  </div>

  <div class="field">
    <input type="checkbox" id="certifyBox" name="certify" data-automation-id="reviewSection_certify" />
    <label for="certifyBox">I certify that the information provided is true and complete.</label>
  </div>

  <button type="button" data-automation-id="bottom-navigation-back-button">Back</button>
  <button type="button" data-automation-id="submit-application-button">Submit</button>
</div>
</body>
</html>
