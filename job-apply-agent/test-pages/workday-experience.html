<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Work Experience - Workday</title></head>
<body>
<div data-automation-id="experiencePage">
  <h2>Work Experience</h2>

  <div class="field">
    <label for="jobTitle">Job Title</label>
    <input type="text" id="jobTitle" name="jobTitle" data-automation-id="experienceSection_jobTitle" />
  </div>
  <div class="field">
    <label for="companyName">Company</label>
    <input type="text" id="companyName" name="companyName" data-automation-id="experienceSection_company" />
  </div>
  <div class="field">
    <label for="workLocation">Location</label>
    <input type="text" id="workLocation" name="workLocation" data-automation-id="experienceSection_location" />
  </div>
  <div class="field">
    <label for="fromDate">From Date</label>
    <input type="text" id="fromDate" name="fromDate" data-automation-id="experienceSection_fromDate" placeholder="MM/YYYY" />
  </div>
  <div class="field">
    <label for="toDate">To Date</label>
    <input type="text" id="toDate" name="toDate" data-automation-id="experienceSection_toDate" placeholder="MM/YYYY" />
  </div>
  <div class="field">
    <label for="roleSummary">Role Summary</label>
    <textarea id="roleSummary" name="roleSummary" data-automation-id="experienceSection_roleDescription"></textarea>
  </div>

  <button type="button" data-automation-id="bottom-navigation-next-button">Save and Continue</button>
</div>
</body>
</html>
